name: Reusable upstream image build

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      upstream_ref:
        required: true
        type: string
      upstream_sha:
        required: true
        type: string
      image_tags:
        required: true
        type: string
      image_version:
        required: true
        type: string
      image_title:
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nodewarden

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Check out upstream repository
        uses: actions/checkout@v4
        with:
          repository: shuaiplus/nodewarden
          ref: ${{ inputs.upstream_ref }}
          path: upstream

      - name: Stage Docker overlay
        run: |
          chmod +x packaging/scripts/stage-overlay.sh
          packaging/scripts/stage-overlay.sh "$GITHUB_WORKSPACE/upstream" "$GITHUB_WORKSPACE/packaging"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: ${{ inputs.image_tags }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=${{ inputs.image_title }}
            org.opencontainers.image.description=NodeWarden packaged for local Wrangler Docker runtime
            org.opencontainers.image.source=https://github.com/shuaiplus/nodewarden
            org.opencontainers.image.revision=${{ inputs.upstream_sha }}
            org.opencontainers.image.version=${{ inputs.image_version }}
            io.wochen5770.nodewarden-docker.channel=${{ inputs.channel }}
            io.wochen5770.nodewarden-docker.packaging-repo=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./upstream/Dockerfile.local
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
